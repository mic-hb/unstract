# Dokploy-specific override for Unstract
#
# Layered on top of docker-compose.yaml + docker-compose-dev-essentials.yaml
# (the latter is pulled in by the former via the `include:` directive).
#
# The `include:` directive below re-declares docker-compose-dev-essentials.yaml.
# This is required because Dokploy's domain-to-service validator does NOT
# follow `include:` in the main compose file - it only reads the file paths
# in "Compose File" / "Extra Compose Files" verbatim. Without this re-include,
# the dev-essentials services (reverse-proxy, db, redis, rabbitmq, minio,
# qdrant, feature-flag) are invisible to the validator and any domain mapped
# to e.g. `reverse-proxy` fails with "service does not exist in the compose".
# Re-including the same file is idempotent for compose merge.
#
include:
  - docker-compose-dev-essentials.yaml

# What this file adds vs. upstream:
#   1. An `unstract-setup` one-shot init container that generates all the
#      per-service .env files (backend, platform-service, prompt-service,
#      x2text-service, runner, workers) plus docker/essentials.env,
#      docker/.env, and docker/proxy_overrides.yaml. Nothing sensitive ever
#      needs to be committed to the fork.
#   2. Every service that has an env_file (or that depends on the
#      proxy_overrides.yaml file existing) has `depends_on.unstract-setup:
#      service_completed_successfully` so it waits for init to finish.
#   3. Bundled Traefik (reverse-proxy) is moved off port 80 (Dokploy owns
#      80) and onto port 8889 host-side, and its docker provider is
#      disabled. Its internal routing comes from a file provider that
#      reads docker/traefik-internal.yml, with *.unstract.localhost host
#      rules replaced with the real UNSTRACT_HOST.
#   4. Internal-only services have their host port mappings cleared (the
#      bundled Traefik reaches them over the unstract-network by container
#      name).
#
# Required env (set in Dokploy UI):
#   UNSTRACT_HOST             e.g. unstract.example.com
#   UNSTRACT_PUBLIC_PORT      e.g. 8888
#
# Everything else is generated at deploy time by unstract-setup.

services:
  # ----------------------------------------------------------------------
  # Init container. Runs once per `docker compose up`, generates the .env
  # files on the host filesystem (via the bind mount), then exits. Existing
  # .env files are preserved so ENCRYPTION_KEY persists across redeploys.
  # ----------------------------------------------------------------------
  unstract-setup:
    image: python:3.12-alpine
    container_name: unstract-setup
    working_dir: /unstract
    volumes:
      - ..:/unstract
    command: ["python", "/unstract/docker/scripts/init-unstract.py"]
    environment:
      - PYTHONUNBUFFERED=1
    restart: "no"
    labels:
      - traefik.enable=false

  # Replace *.unstract.localhost host rules with the real hostname.
  #
  # IMPORTANT: traefik.enable=false on the application containers.
  # If we set traefik.enable=true, dokploy-traefik's docker provider
  # auto-creates a router for unstract.ngelantour.cloud pointing
  # directly at unstract-frontend:80 (using its unstract-network IP
  # 172.23.0.27, which dokploy-traefik cannot reach from dokploy-network).
  # That auto-router has a higher priority than anything we set in a
  # file, so the request 504s. Disabling it here forces dokploy-traefik
  # to use ONLY the router we define on the bundled Traefik below
  # (which IS on dokploy-network and reachable).
  # ----------------------------------------------------------------------
  frontend:
    depends_on:
      unstract-setup:
        condition: service_completed_successfully
    ports: !override []
    labels:
      - traefik.enable=false
  backend:
    depends_on:
      unstract-setup:
        condition: service_completed_successfully
    environment:
      # Override backend/.env's WEB_APP_ORIGIN_URL (which is hardcoded to
      # "http://frontend.unstract.localhost" in sample.env) with the real
      # public origin. The backend uses this for CORS_ALLOWED_ORIGINS,
      # CSRF_TRUSTED_ORIGINS, and post-login redirects - so it MUST
      # match what the browser sends. Compose's `environment:` takes
      # precedence over `env_file:`, so this wins without editing the
      # generated .env file.
      - WEB_APP_ORIGIN_URL=${WEB_APP_ORIGIN_URL:-https://unstract.ngelantour.cloud}
    ports: !override []
    labels:
      - traefik.enable=false

  # ----------------------------------------------------------------------
  # Bundled Traefik (reverse-proxy). Routing config is split between
  # two Traefik instances:
  #
  #   - Bundled Traefik: file provider ONLY (--providers.docker=false).
  #     Reads docker/traefik-internal.yml. Routes to unstract-frontend:80
  #     and unstract-backend:8000 (on unstract-network).
  #
  #   - dokploy-traefik: docker provider. Picks up the labels on this
  #     container and creates public-facing HTTPS routers. The label
  #     service "unstract-proxy" with no explicit port/URL causes
  #     dokploy-traefik to auto-resolve to this container's IP on
  #     dokploy-network (port 80, the first binding's container port)
  #     - which IS reachable from dokploy-traefik.
  #
  # Why disable the bundled Traefik's docker provider? Both Traefik
  # instances see the same labels on this container. With docker
  # provider enabled on both, the bundled Traefik would also try to
  # create a service called "unstract-proxy" - but no such container
  # exists in its own docker view, so the resolution fails and the
  # bundled Traefik's own routing breaks. Disabling the docker
  # provider here makes the bundled Traefik's config source SOLELY
  # the file provider (docker/traefik-internal.yml), which is the
  # cleanest separation.
  # ----------------------------------------------------------------------
  reverse-proxy:
    depends_on:
      unstract-setup:
        condition: service_completed_successfully
    environment:
      # Traefik's file provider evaluates {{ env "UNSTRACT_HOST" }} at
      # load time. The Dokploy UI sets UNSTRACT_HOST for compose-time
      # expansion, but Traefik has its own env namespace - we have to
      # forward it explicitly.
      - UNSTRACT_HOST=${UNSTRACT_HOST}
    command:
      - --api.insecure=true
      - --accesslog=true
      - --log.level=INFO
      - --providers.docker=false
      - --providers.file=true
      - --providers.file.filename=/etc/traefik/internal.yml
      - --providers.file.watch=true
    ports: !override
      - "${UNSTRACT_PUBLIC_PORT:-8888}:80"
      - "8081:8080"
    networks: !override
      - default
      - dokploy-network
    volumes:
      - ./traefik-internal.yml:/etc/traefik/internal.yml:ro
    labels:
      - traefik.enable=true
      # dokploy-traefik routers (visible to the public internet).
      # Service is unstract-proxy with no explicit port/URL. The
      # dokploy-traefik docker provider auto-resolves this to the
      # reverse-proxy container's IP on dokploy-network, port 80
      # (auto-discovered from the first binding "8889:80").
      - traefik.http.routers.unstract-frontend-secure.rule=Host(`${UNSTRACT_HOST}`) && !PathPrefix(`/api/v1`) && !PathPrefix(`/deployment`) && !PathPrefix(`/public`)
      - traefik.http.routers.unstract-frontend-secure.entrypoints=websecure
      - traefik.http.routers.unstract-frontend-secure.tls=true
      - traefik.http.routers.unstract-frontend-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.unstract-frontend-secure.service=unstract-proxy
      - traefik.http.routers.unstract-frontend-web.rule=Host(`${UNSTRACT_HOST}`) && !PathPrefix(`/api/v1`) && !PathPrefix(`/deployment`) && !PathPrefix(`/public`)
      - traefik.http.routers.unstract-frontend-web.entrypoints=web
      - traefik.http.routers.unstract-frontend-web.service=unstract-proxy
      - traefik.http.routers.unstract-backend-secure.rule=Host(`${UNSTRACT_HOST}`) && (PathPrefix(`/api/v1`) || PathPrefix(`/deployment`) || PathPrefix(`/public`))
      - traefik.http.routers.unstract-backend-secure.entrypoints=websecure
      - traefik.http.routers.unstract-backend-secure.tls=true
      - traefik.http.routers.unstract-backend-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.unstract-backend-secure.service=unstract-proxy
      - traefik.http.routers.unstract-backend-web.rule=Host(`${UNSTRACT_HOST}`) && (PathPrefix(`/api/v1`) || PathPrefix(`/deployment`) || PathPrefix(`/public`))
      - traefik.http.routers.unstract-backend-web.entrypoints=web
      - traefik.http.routers.unstract-backend-web.service=unstract-proxy

  # ----------------------------------------------------------------------
  # Remaining services. Each one has env_file directives that reference
  # .env files produced by unstract-setup.
  # ----------------------------------------------------------------------
  worker-metrics:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
  worker-ide-callback:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
  celery-flower:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  celery-beat:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
  platform-service:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  prompt-service:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  x2text-service:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  runner:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-api-deployment-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-callback-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-file-processing-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-general-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-notification-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-log-consumer-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-log-history-scheduler-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-scheduler-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  worker-executor-v2:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []

  # ----------------------------------------------------------------------
  # Essentials (from docker-compose-dev-essentials.yaml) - they all
  # depend on docker/essentials.env and the unstract-network.
  # ----------------------------------------------------------------------
  db:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  minio:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  qdrant:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  rabbitmq:
    depends_on:
      unstract-setup: { condition: service_completed_successfully }
    ports: !override []
  redis:
    ports: !override []
  feature-flag:
    ports: !override []
  # unstructured-io is in the upstream 'optional' profile (only started
  # with `docker compose --profile optional`). On Dokploy we pass no
  # profile flag in the custom run command, so the container never
  # comes up. Drop the profile here so the free local text extractor
  # is available alongside the paid ones.
  unstructured-io:
    profiles: []
    ports: !override []

# ----------------------------------------------------------------------
# Add `dokploy-network` as an externally-defined network. The bundled
# Traefik's `networks:` entry above references it. If your Dokploy
# instance uses a different network name (e.g. a per-project bridge),
# replace the value of `name:` below.
# ----------------------------------------------------------------------
networks:
  dokploy-network:
    external: true
    name: dokploy-network
